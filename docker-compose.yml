services:
  # =============================================
  # Ryu SDN Controller (Control Plane)
  # =============================================
  ryu:
    build: ./ryu
    container_name: ryu-controller
    restart: unless-stopped
    ports:
      # OpenFlow — OVS on the host connects to this port
      - "6653:6653"
      # REST API — used by Zeek and ML Pipeline for dynamic policy injection
      - "8080:8080"
    volumes:
      # Mount the config directory so device_profiles.json can be edited on the host and reloaded via the REST API.
      - ./ryu/config:/opt/ryu/config:ro
    networks:
      - gateway-net
    # Resource limits per architecture doc estimates
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # =============================================
  # AdGuard Home (DNS Filtering)
  # =============================================
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    restart: unless-stopped
    ports:
      # DNS — mapped to the br0 gateway IP so IoT clients reach it
      - "192.168.50.1:53:53/tcp"
      - "192.168.50.1:53:53/udp"
      # Admin panel / initial setup wizard
      - "3000:3000/tcp"
      # After initial setup, the admin UI moves to port 80 inside the container.
      # We map it to 8088 on the host to avoid conflicts.
      - "8088:80/tcp"
    volumes:
      - ./adguard/conf:/opt/adguardhome/conf
      - ./adguard/work:/opt/adguardhome/work
    networks:
      gateway-net:
          ipv4_address: 172.20.0.53
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  # =============================================
  # Zeek (Network Analysis)
  # =============================================
  zeek:
    image: zeek/zeek:lts
    container_name: zeek
    restart: unless-stopped
    entrypoint: ["/opt/zeek-entrypoint/entrypoint.sh"]
    # Zeek runs in live capture mode on the mirror interface (zeek-eth1),
    # which is attached by the post-startup script (attach-zeek-mirror.sh) which is handled by systemd.
    # On first start, before the mirror interface exists, Zeek will fail
    # and restart — this is expected. Once the script runs, Zeek will
    # find the interface and begin capturing. 
    # entrypoint.sh keeps zeek alive until the mirror interface has been attached, then starts zeek. 
    volumes:
      # Zeek writes logs here; the ML pipeline reads from here.
      - zeek-logs:/opt/zeek-logs
      # Custom Zeek scripts
      - ./zeek/site/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - ./zeek/entrypoint.sh:/opt/zeek-entrypoint/entrypoint.sh:ro
    environment:
      - ZEEK_LOG_DIR=/opt/zeek-logs
    # Override the default log directory.
    working_dir: /opt/zeek-logs
    networks:
      - gateway-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # =============================================
  # Python ML Pipeline
  # =============================================
  ml-pipeline:
    build: ./ml-pipeline
    container_name: ml-pipeline
    restart: unless-stopped
    depends_on:
      - ryu
      - zeek
    volumes:
      # Read Zeek's log output
      - zeek-logs:/opt/zeek-logs:ro
    environment:
      - RYU_API_URL=http://ryu:8080
      - POLL_INTERVAL=10
    networks:
      - gateway-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.25"
          memory: 512M

# =============================================
# Networks
# =============================================
networks:
  gateway-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
    # This is an internal Docker bridge network for container-to-container
    # communication. It is NOT connected to the OVS bridge. Containers that
    # need to reach the host or be reached by IoT clients use port mappings.

# =============================================
# Volumes
# =============================================
volumes:
  zeek-logs:
    # Shared volume: Zeek writes, ML Pipeline reads.
    driver: local
