services:
  # =============================================
  # Ryu SDN Controller (Control Plane)
  # =============================================
  ryu:
    build: ./ryu
    container_name: ryu-controller
    restart: unless-stopped
    ports:
      # OpenFlow — OVS on the host connects to this port
      - "6653:6653"
      # REST API — used by Zeek and ML Pipeline for dynamic policy injection
      - "8080:8080"
    volumes:
      # Mount the config directory so device_profiles.json can be edited on the host and reloaded via the REST API.
      - ./ryu/config:/opt/ryu/config:ro
    networks:
      - gateway-net
    # Resource limits per architecture doc estimates
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # =============================================
  # AdGuard Home (DNS Filtering)
  # =============================================
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    restart: unless-stopped
    ports:
      # DNS — mapped to the br0 gateway IP so IoT clients reach it
      - "192.168.50.1:53:53/tcp"
      - "192.168.50.1:53:53/udp"
      # Admin panel / initial setup wizard
      - "3000:3000/tcp"
      # After initial setup, the admin UI moves to port 80 inside the container.
      # We map it to 8088 on the host to avoid conflicts.
      - "8088:80/tcp"
    volumes:
      - ./adguard/conf:/opt/adguardhome/conf
      - ./adguard/work:/opt/adguardhome/work
    networks:
      gateway-net:
          ipv4_address: 172.20.0.53
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  # =============================================
  # Zeek (Network Analysis)
  # =============================================
  zeek:
    image: zeek/zeek:lts
    container_name: zeek
    restart: unless-stopped
    entrypoint: ["/opt/zeek-entrypoint/entrypoint.sh"]
    # Zeek runs in live capture mode on the mirror interface (zeek-eth1),
    # which is attached by the post-startup script (attach-zeek-mirror.sh) which is handled by systemd.
    # On first start, before the mirror interface exists, Zeek will fail
    # and restart — this is expected. Once the script runs, Zeek will
    # find the interface and begin capturing. 
    # entrypoint.sh keeps zeek alive until the mirror interface has been attached, then starts zeek. 
    volumes:
      # Zeek writes logs here; the ML pipeline reads from here.
      - zeek-logs:/opt/zeek-logs
      # Mount the entire site directory (detection scripts + IOCs).
      - ./zeek/site:/usr/local/zeek/share/zeek/site:ro
      - ./zeek/entrypoint.sh:/opt/zeek-entrypoint/entrypoint.sh:ro
      # Mounting the entire `site/` directory replaces the default 
      # contents of `/usr/local/zeek/share/zeek/site/` inside the container.
      # The default `site/` directory in the Zeek image contains a `local.zeek` that
      # loads `local-manager.zeek`, `local-worker.zeek`, etc. Since this
      # `local.zeek` is a complete replacement that loads everything that is needed, this
      # is fine. But if at anypoint anything from Zeek's default site scripts is needed,
      # it needs to be copied into the custom `zeek/site/` directory.
    environment:
      - ZEEK_LOG_DIR=/opt/zeek-logs
    # Override the default log directory.
    working_dir: /opt/zeek-logs
    networks:
      - gateway-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # =============================================
  # Python ML Pipeline
  # =============================================
  ml-pipeline:
    build: ./ml-pipeline
    container_name: ml-pipeline
    restart: unless-stopped
    depends_on:
      - ryu
      - zeek
    volumes:
      # Zeek logs: read-only mount removed so the pipeline can write ml_alerts.log.
      # The pipeline only writes to ml_alerts.log; all Zeek log files are untouched.
      - zeek-logs:/opt/zeek-logs
      # Trained Isolation Forest models (populated by running train/train.py).
      # Mount as read-only - the pipeline loads but never overwrites models.
      - ./ml-pipeline/models:/opt/ml-pipeline/models:ro
      # Alert threshold configuration (thresholds.yml).
      # Edit on the host and restart the container to apply changes.
      - ./ml-pipeline/config:/opt/ml-pipeline/config:ro
    environment:
      - RYU_API_URL=http://ryu:8080
      - POLL_INTERVAL=10
      - ZEEK_LOG_DIR=/opt/zeek-logs
      - MODELS_DIR=/opt/ml-pipeline/models
      - CONFIG_PATH=/opt/ml-pipeline/config/thresholds.yml
      - ML_ALERT_LOG=/opt/zeek-logs/ml_alerts.log
      # Keep auto-isolation disabled (dry-run mode) until the models have been
      # validated against real traffic. Set to "true" to enable.
      - ML_AUTO_ISOLATE=false
    networks:
      - gateway-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.25"
          memory: 512M

# =============================================
# Networks
# =============================================
networks:
  gateway-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
    # This is an internal Docker bridge network for container-to-container
    # communication. It is NOT connected to the OVS bridge. Containers that
    # need to reach the host or be reached by IoT clients use port mappings.

# =============================================
# Volumes
# =============================================
volumes:
  zeek-logs:
    # Shared volume: Zeek writes, ML Pipeline reads.
    driver: local
